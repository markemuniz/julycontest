<style>
  :root{
    --bg:#0f0d0d;
    --card:#fdf9f2;
    --line:#e7ddc9;
    --ink:#211a17;
    --muted:#8a7f76;
    --black:#161213;
    --black-soft:#221b1c;
    --red:#c81e2c;
    --red-deep:#8c1420;
    --gold:#e8b23d;
    --gold-deep:#b3841f;
    --empty:#eee4cf;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; }
  body {
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
    background: var(--bg);
  }
  .display { font-family:'Bebas Neue', 'Inter', sans-serif; letter-spacing: 0.03em; }

  @keyframes pop {
    0% { transform: scale(1); }
    35% { transform: scale(1.35) rotate(-6deg); }
    65% { transform: scale(0.92) rotate(4deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .star-pop { animation: pop 0.35s ease; display:inline-block; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.35s ease; }

  .perforation {
    height: 0;
    border-top: 2px dashed rgba(232,178,61,0.35);
    position: relative;
  }
  .perforation::before, .perforation::after {
    content: '';
    position: absolute;
    top: -8px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--bg);
  }
  .perforation::before { left: -8px; }
  .perforation::after { right: -8px; }

  ::-webkit-scrollbar { height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--red-deep); border-radius: 10px; }
</style>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const NAMES = ["Destiny","Dustin","Eve","Gio","Ian","Jaina","Kathy","Liv","Marcellus","Mic","Micaela","Michael","Nick","Owen","Paul","Rashad","Shiloh","Skye","Tamika","Will","Xavier","Zora"];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const TROPHIES = ['🥇','🥈','🥉'];

// Change this to whatever PIN managers should use to unlock editing.
const EDIT_PIN = "SOHO2026";

function daysInMonth(year, monthIdx){ return new Date(year, monthIdx+1, 0).getDate(); }
function dayOfWeekLabel(year, monthIdx, day){
  const d = new Date(year, monthIdx, day).getDay();
  return ["S","M","T","W","T","F","S"][d];
}

// Shrinks a pasted/uploaded screenshot down to a reasonable size and returns
// a base64 data URL, so it can be stored directly alongside the quote text
// in the Realtime Database (avoids needing separate Firebase Storage rules).
function compressImageFile(file, maxDim = 900, quality = 0.72){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read the image file.'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load the image.'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function StarIcon({ size=18, style={} }){
  return React.createElement('svg', {
    width:size, height:size, viewBox:'0 0 24 24',
    style:{display:'inline-block', filter:'drop-shadow(0 1px 1.5px rgba(0,0,0,0.45))', flexShrink:0, ...style}
  },
    React.createElement('path', {
      d:'M12 2 14.9 8.6 22 9.3 16.5 13.9 18.2 21 12 17.3 5.8 21 7.5 13.9 2 9.3 9.1 8.6 12 2Z',
      fill:'url(#ttaStarGrad)',
      stroke:'#7a4a00',
      strokeWidth:'1',
      strokeLinejoin:'round'
    })
  );
}

function Leaf({ size=18, color='var(--gold)', style={} }){
  return React.createElement('svg', {
    width:size, height:size, viewBox:'0 0 64 64', style
  },
    React.createElement('path', {
      fill: color,
      d: "M32 6c1.5 6 2.5 12 2 18 4-4.5 8-8 13.5-10-2 5.5-5 10-9 13.5 6-1 11.5-1 17.5 1-5.5 3-11 4.5-17 4.5 5 3 9 7 12 12.5-6-1.5-11-4-15-8 1 5.5 0.5 11-1 16.5-2.5-5-4-10-4-15.5-1.5 5-4.5 9-9 12 0.5-5.5 2-10.5 4.5-15-4.5 3.5-10 5.5-16 6 3.5-5 8-9 13.5-11.5-6 0-11.5-1.5-16.5-4.5 6-2 11.5-2.5 17.5-1.5-4-3.5-7-8-9-13 5.5 2 9.5 5.5 13.5 10-1-6-0.5-12 1.5-18z",
      transform: "translate(0,0) scale(0.6) translate(21,21)"
    })
  );
}

function LockControl({ unlocked, onUnlock, onLock }){
  const [open, setOpen] = useState(false);
  const [pin, setPin] = useState('');
  const [wrong, setWrong] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);

  const submit = () => {
    if (pin === EDIT_PIN) {
      onUnlock();
      setOpen(false);
      setPin('');
      setWrong(false);
    } else {
      setWrong(true);
      setPin('');
      setTimeout(() => setWrong(false), 400);
    }
  };

  if (unlocked) {
    return React.createElement('button', {
      onClick: onLock,
      style: {...lockBtnStyle, background:'rgba(232,178,61,0.9)', color:'#3a2a04'}
    }, '🔓 Editing on · tap to lock');
  }

  if (open) {
    return React.createElement('div', {className: wrong ? 'shake' : '', style:{display:'flex', alignItems:'center', gap:'6px'}},
      React.createElement('input', {
        ref: inputRef,
        type:'password',
        value: pin,
        onChange: e => setPin(e.target.value),
        onKeyDown: e => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') setOpen(false); },
        placeholder:'PIN',
        style:{width:'80px', padding:'5px 8px', borderRadius:'4px', border:'1px solid var(--gold)', background:'var(--black)', color:'#fff', fontSize:'13px'}
      }),
      React.createElement('button', {onClick: submit, style: lockBtnStyle}, 'Unlock'),
      React.createElement('button', {onClick: () => setOpen(false), style:{...lockBtnStyle, background:'transparent', color:'#c9bfb3'}}, '✕')
    );
  }

  return React.createElement('button', {
    onClick: () => setOpen(true),
    style: lockBtnStyle
  }, '🔒 Locked');
}

function App(){
  const now = new Date();
  const [year, setYear] = useState(2026);
  const [monthIdx, setMonthIdx] = useState(6);
  const [grid, setGrid] = useState({});
  const [quotes, setQuotes] = useState({});
  const [positions, setPositions] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [sortByTotal, setSortByTotal] = useState(false);
  const [error, setError] = useState(null);
  const [poppedKey, setPoppedKey] = useState(null);
  const [unlocked, setUnlocked] = useState(false);
  const [connected, setConnected] = useState(false);

  // Live Firebase listener, this is what makes it update on other computers
  // in real time instead of needing a manual refresh.
  useEffect(() => {
    const ref = db.ref(DATA_PATH);
    const handler = ref.on('value', (snapshot) => {
      setGrid(snapshot.val() || {});
      setLoaded(true);
      setConnected(true);
    }, (err) => {
      setError("Couldn't connect to Firebase. Check the config at the top of the file.");
      setLoaded(true);
    });
    return () => ref.off('value', handler);
  }, []);

  // Live listener for review quotes tied to the leaderboard.
  useEffect(() => {
    const ref = db.ref(QUOTES_PATH);
    const handler = ref.on('value', (snapshot) => {
      setQuotes(snapshot.val() || {});
    });
    return () => ref.off('value', handler);
  }, []);

  // Live listener for pinned card positions on the bulletin board, so
  // dragging a card on one device shows up on every other device too.
  useEffect(() => {
    const ref = db.ref(ORDER_PATH);
    const handler = ref.on('value', (snapshot) => {
      setPositions(snapshot.val() || {});
    });
    return () => ref.off('value', handler);
  }, []);

  const cellKey = (name, day) => `${name}_${year}-${String(monthIdx+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

  const writeCount = async (key, count) => {
    setSaving(true);
    try {
      if (count <= 0) {
        await db.ref(`${DATA_PATH}/${key}`).remove();
      } else {
        await db.ref(`${DATA_PATH}/${key}`).set(count);
      }
      setError(null);
    } catch (e) {
      setError("Save failed. Check your connection and try again.");
    } finally {
      setSaving(false);
    }
  };

  const addStar = (name, day) => {
    if (!unlocked) return;
    const key = cellKey(name, day);
    setPoppedKey(key + Date.now());
    const next = Math.min((grid[key]||0) + 1, 9);
    writeCount(key, next);
  };

  const removeStar = (name, day) => {
    if (!unlocked) return;
    const key = cellKey(name, day);
    const current = grid[key]||0;
    if (current <= 0) return;
    writeCount(key, current - 1);
  };

  const addQuote = async (name, text, imageFile) => {
    const trimmed = (text || '').trim();
    if (!trimmed && !imageFile) return;
    setSaving(true);
    try {
      let imageData = null;
      if (imageFile) {
        imageData = await compressImageFile(imageFile);
      }
      const payload = { addedAt: Date.now() };
      if (trimmed) payload.text = trimmed;
      if (imageData) payload.imageData = imageData;
      await db.ref(`${QUOTES_PATH}/${name}`).push(payload);
      setError(null);
    } catch (e) {
      setError("Couldn't save the quote. Check your connection and try again.");
      throw e;
    } finally {
      setSaving(false);
    }
  };

  const removeQuote = async (name, quoteKey) => {
    setSaving(true);
    try {
      await db.ref(`${QUOTES_PATH}/${name}/${quoteKey}`).remove();
      setError(null);
    } catch (e) {
      setError("Couldn't remove the quote. Check your connection and try again.");
    } finally {
      setSaving(false);
    }
  };

  const savePosition = async (name, xPct, yPx, scale) => {
    try {
      const payload = { xPct, yPx };
      if (typeof scale === 'number') payload.scale = scale;
      await db.ref(`${ORDER_PATH}/${name}`).set(payload);
      setError(null);
    } catch (e) {
      setError("Couldn't save the card. Check your connection and try again.");
    }
  };

  const resetPositions = async () => {
    setSaving(true);
    try {
      await db.ref(ORDER_PATH).remove();
      setError(null);
    } catch (e) {
      setError("Couldn't reset the board. Check your connection and try again.");
    } finally {
      setSaving(false);
    }
  };

  const days = useMemo(() => {
    const n = daysInMonth(year, monthIdx);
    return Array.from({length:n}, (_,i) => i+1);
  }, [year, monthIdx]);

  const totals = useMemo(() => {
    const t = {};
    NAMES.forEach(name => {
      let sum = 0;
      days.forEach(day => { sum += grid[cellKey(name, day)] || 0; });
      t[name] = sum;
    });
    return t;
  }, [grid, days, year, monthIdx]);

  const orderedNames = useMemo(() => {
    if (!sortByTotal) return NAMES;
    return [...NAMES].sort((a,b) => totals[b]-totals[a] || a.localeCompare(b));
  }, [sortByTotal, totals]);

  const rankedForTrophy = useMemo(() => {
    const withTotals = NAMES.map(n => [n, totals[n]]).filter(([,v]) => v > 0);
    withTotals.sort((a,b) => b[1]-a[1]);
    const trophyMap = {};
    withTotals.slice(0,3).forEach(([n], i) => { trophyMap[n] = TROPHIES[i]; });
    return trophyMap;
  }, [totals]);

  const topThree = useMemo(() => {
    const withTotals = NAMES.map(n => [n, totals[n]]).filter(([,v]) => v > 0);
    withTotals.sort((a,b) => b[1]-a[1]);
    return withTotals.slice(0,3);
  }, [totals]);

  // Full leaderboard for this month, everyone with at least one star, ranked.
  // Rank is still based on stars, it's just used for the badge, the pin
  // position on the board is independent of this order.
  const leaderboard = useMemo(() => {
    const withTotals = NAMES.map(n => [n, totals[n]]).filter(([,v]) => v > 0);
    withTotals.sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0]));
    return withTotals;
  }, [totals]);

  const hasCustomPositions = Object.keys(positions).length > 0;

  const monthTotal = useMemo(() => Object.values(totals).reduce((a,b)=>a+b,0), [totals]);

  const goPrevMonth = () => {
    if (monthIdx === 0) { setMonthIdx(11); setYear(y=>y-1); }
    else setMonthIdx(m=>m-1);
  };
  const goNextMonth = () => {
    if (monthIdx === 11) { setMonthIdx(0); setYear(y=>y+1); }
    else setMonthIdx(m=>m+1);
  };

  const todayMatch = (year === now.getFullYear() && monthIdx === now.getMonth());

  if (!loaded) {
    return React.createElement('div', {style:{padding:'60px', textAlign:'center', color:'var(--gold)', fontFamily:'Bebas Neue', fontSize:'20px', letterSpacing:'0.06em'}}, 'LOADING THE STAR BOARD…');
  }

  return React.createElement('div', {style:{maxWidth:'100%', paddingBottom:'40px'}},

    // Hidden shared gradient definition, referenced by every StarIcon.
    React.createElement('svg', {width:0, height:0, style:{position:'absolute'}},
      React.createElement('defs', null,
        React.createElement('linearGradient', {id:'ttaStarGrad', x1:'0%', y1:'0%', x2:'0%', y2:'100%'},
          React.createElement('stop', {offset:'0%', stopColor:'#fff3c4'}),
          React.createElement('stop', {offset:'45%', stopColor:'#ffc93d'}),
          React.createElement('stop', {offset:'100%', stopColor:'#d98c00'})
        )
      )
    ),

    // Banner
    React.createElement('div', {style:{
      background: 'linear-gradient(135deg, var(--black) 0%, var(--red-deep) 55%, var(--red) 100%)',
      padding:'28px 24px 20px', color:'#fdf9f2', position:'relative'
    }},
      React.createElement('div', {style:{position:'absolute', inset:0, overflow:'hidden', pointerEvents:'none'}},
        React.createElement(Leaf, {size:140, color:'rgba(232,178,61,0.07)', style:{position:'absolute', right:'-20px', top:'-30px', transform:'rotate(12deg)'}})
      ),
      React.createElement('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:'14px', position:'relative'}},
        React.createElement('div', null,
          React.createElement('div', {style:{display:'flex', alignItems:'center', gap:'6px', fontSize:'12px', letterSpacing:'0.2em', textTransform:'uppercase', fontWeight:700, color:'var(--gold)'}},
            React.createElement(Leaf, {size:13}),
            'The Travel Agency · Google Review Contest',
            React.createElement(Leaf, {size:13})
          ),
          React.createElement('h1', {className:'display', style:{margin:'6px 0 0', fontSize:'38px', lineHeight:1.25, paddingTop:'4px', color:'#fff'}}, 'SOHO STAR BOARD')
        ),
        React.createElement('div', {style:{display:'flex', alignItems:'center', gap:'10px', background:'rgba(0,0,0,0.35)', padding:'6px 10px', borderRadius:'6px', border:'1px solid rgba(232,178,61,0.4)'}},
          React.createElement('button', {onClick: goPrevMonth, style: navBtnStyle}, '←'),
          React.createElement('div', {className:'display', style:{fontSize:'19px', minWidth:'150px', textAlign:'center', color:'var(--gold)'}}, `${MONTH_NAMES[monthIdx]} ${year}`.toUpperCase()),
          React.createElement('button', {onClick: goNextMonth, style: navBtnStyle}, '→')
        )
      ),

      // top 3 as boarding-pass stubs
      topThree.length > 0 && React.createElement('div', {style:{display:'flex', gap:'10px', marginTop:'20px', flexWrap:'wrap', position:'relative'}},
        topThree.map(([name, total], i) =>
          React.createElement('div', {key:name, style:{
            background:'var(--black-soft)', color:'#fdf9f2', borderRadius:'6px',
            padding:'8px 14px', display:'flex', alignItems:'center', gap:'8px',
            borderLeft:'4px solid var(--gold)', boxShadow:'0 4px 14px rgba(0,0,0,0.4)', fontWeight:700
          }},
            React.createElement('span', {style:{fontSize:'18px'}}, TROPHIES[i]),
            React.createElement('span', {className:'display', style:{fontSize:'16px', letterSpacing:'0.02em'}}, name.toUpperCase()),
            React.createElement('span', {style:{color:'var(--gold)', fontWeight:800}}, total)
          )
        )
      )
    ),

    React.createElement('div', {className:'perforation'}),

    React.createElement('div', {style:{padding:'20px 20px 0'}},

      React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'16px', marginBottom:'14px', flexWrap:'wrap'}},
        React.createElement('div', {style:{display:'flex', alignItems:'center', gap:'16px', flexWrap:'wrap'}},
          React.createElement('label', {style:{display:'flex', alignItems:'center', gap:'6px', fontSize:'13px', cursor:'pointer', userSelect:'none', background:'var(--black-soft)', color:'#fdf9f2', border:'1px solid var(--red-deep)', padding:'6px 10px', borderRadius:'6px'}},
            React.createElement('input', {type:'checkbox', checked:sortByTotal, onChange:e=>setSortByTotal(e.target.checked)}),
            '🏆 Sort by total stars'
          ),
          React.createElement('div', {style:{fontSize:'13px', color:'#c9bfb3'}},
            'Month total: ', React.createElement('strong', {style:{color:'var(--gold)'}}, monthTotal), ' stars'
          ),
          saving && React.createElement('div', {style:{fontSize:'12px', color:'var(--gold)', fontWeight:600}}, 'Saving…'),
          !saving && connected && React.createElement('div', {style:{fontSize:'11px', color:'#8a7f76', display:'flex', alignItems:'center', gap:'4px'}},
            React.createElement('span', {style:{width:'6px', height:'6px', borderRadius:'50%', background:'#4caf50', display:'inline-block'}}),
            'Live'
          ),
          error && React.createElement('div', {style:{fontSize:'12px', color:'#e57373'}}, error)
        ),
        React.createElement(LockControl, {
          unlocked,
          onUnlock: () => setUnlocked(true),
          onLock: () => setUnlocked(false)
        })
      ),

      // grid
      React.createElement('div', {style:{overflowX:'auto', border:'1px solid var(--red-deep)', borderRadius:'10px', background:'var(--card)', boxShadow:'0 6px 24px rgba(0,0,0,0.35)'}},
        React.createElement('table', {style:{borderCollapse:'separate', borderSpacing:0, width:'100%'}},
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', {style:{...thStyle, position:'sticky', left:0, zIndex:3, background:'var(--black)', minWidth:'140px', textAlign:'left', paddingLeft:'16px'}}, 'NAME'),
              days.map(day => {
                const isToday = todayMatch && day === now.getDate();
                return React.createElement('th', {
                  key: day,
                  style: {...thStyle, background: isToday ? 'var(--red)' : 'var(--red-deep)', minWidth:'42px'}
                },
                  React.createElement('div', {style:{fontSize:'9px', opacity:0.8, fontWeight:600}}, dayOfWeekLabel(year, monthIdx, day)),
                  React.createElement('div', {className:'display', style:{fontSize:'15px'}}, day)
                );
              }),
              React.createElement('th', {style:{...thStyle, background:'var(--gold)', color:'#3a2a04', minWidth:'60px'}}, 'TOTAL')
            )
          ),
          React.createElement('tbody', null,
            orderedNames.map((name, idx) => {
              const total = totals[name];
              const trophy = rankedForTrophy[name];
              return React.createElement('tr', {key:name, style:{background: idx % 2 === 0 ? '#fdf9f2' : '#f7efdc'}},
                React.createElement('td', {
                  style:{...tdNameStyle, position:'sticky', left:0, zIndex:2, background: idx % 2 === 0 ? '#fdf9f2' : '#f7efdc', borderRight:'2px solid var(--line)'}
                },
                  trophy && React.createElement('span', {style:{marginRight:'6px'}}, trophy),
                  name
                ),
                days.map(day => {
                  const key = cellKey(name, day);
                  const count = grid[key] || 0;
                  const isToday = todayMatch && day === now.getDate();
                  const isPopped = poppedKey && poppedKey.startsWith(key);
                  return React.createElement('td', {
                    key: day,
                    style: {
                      ...tdCellStyle,
                      background: isToday ? '#fbe9ea' : 'transparent',
                      position:'relative'
                    }
                  },
                    React.createElement('div', {
                      onClick: () => addStar(name, day),
                      style:{cursor: unlocked ? 'pointer' : 'default', minHeight:'22px', display:'flex', alignItems:'center', justifyContent:'center'}
                    },
                      count === 0
                        ? React.createElement('span', {style:{color:'var(--empty)', fontSize:'16px'}}, '·')
                        : count <= 3
                          ? React.createElement('span', {className: isPopped ? 'star-pop' : '', style:{display:'inline-flex', alignItems:'center', gap:'1px'}},
                              Array.from({length: count}).map((_, si) => React.createElement(StarIcon, {key: si, size: 17}))
                            )
                          : React.createElement('span', {className: isPopped ? 'star-pop' : '', style:{
                              display:'inline-flex', alignItems:'center', gap:'3px',
                              fontSize:'12px', fontWeight:900, color:'#fff9e6',
                              background:'linear-gradient(160deg, #ff5a63, var(--red) 60%, var(--red-deep))',
                              borderRadius:'8px', padding:'3px 7px 3px 5px', boxShadow:'0 0 8px rgba(200,30,44,0.6)'
                            }},
                              React.createElement(StarIcon, {size: 12}),
                              `×${count}`
                            )
                    ),
                    unlocked && count > 0 && React.createElement('button', {
                      onClick: (e) => { e.stopPropagation(); removeStar(name, day); },
                      title: 'Remove one star',
                      style: removeBtnStyle
                    }, '✕')
                  );
                }),
                React.createElement('td', {style:{...tdCellStyle, fontWeight:800, background: idx % 2 === 0 ? '#fbe9ba' : '#f6dfa0'}},
                  React.createElement('span', {className:'display', style:{fontSize:'15px'}}, total)
                )
              );
            })
          )
        )
      ),

      // Leaderboard section with review quotes
      React.createElement(Leaderboard, {
        leaderboard, quotes, positions, unlocked, hasCustomPositions,
        onAddQuote: addQuote, onRemoveQuote: removeQuote,
        onSavePosition: savePosition, onResetPositions: resetPositions
      })
    )
  );
}

const CARD_WIDTH = 780;
const MIN_SCALE = 0.5;
const MAX_SCALE = 2.5;

// Deterministic slight tilt per name so cards look hand-pinned, without
// having to store a rotation value in the database.
function pinRotation(name){
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) % 1000;
  return (hash % 7) - 3; // -3..3 degrees
}

// Cascading fallback grid position (percent x, px y) for anyone who hasn't
// been dragged to a spot yet, so cards don't all start stacked on top of
// each other.
function defaultBoardPosition(index){
  const perRow = 1;
  const col = index % perRow;
  const row = Math.floor(index / perRow);
  return { xPct: 2 + col * 50, yPx: 24 + row * 780 };
}

function Leaderboard({ leaderboard, quotes, positions, unlocked, hasCustomPositions, onAddQuote, onRemoveQuote, onSavePosition, onResetPositions }){
  const [draftText, setDraftText] = useState({});
  const [draftImage, setDraftImage] = useState({}); // { [name]: { file, previewUrl } }
  const [openAddFor, setOpenAddFor] = useState(null);
  const [uploadingFor, setUploadingFor] = useState(null);
  const [dragName, setDragName] = useState(null);
  const [livePos, setLivePos] = useState(null); // { leftPx, topPx } while actively dragging
  const [resizeName, setResizeName] = useState(null);
  const [liveScale, setLiveScale] = useState(null); // number while actively resizing
  const fileInputRefs = useRef({});
  const boardRef = useRef(null);
  const dragOffsetRef = useRef({ offsetX: 0, offsetY: 0 });
  const livePosRef = useRef(null);
  const dragNameRef = useRef(null);
  const positionsRef = useRef(positions);
  const resizeStartRef = useRef({ startX: 0, startScale: 1 });
  const liveScaleRef = useRef(null);
  const resizeNameRef = useRef(null);

  useEffect(() => { livePosRef.current = livePos; }, [livePos]);
  useEffect(() => { dragNameRef.current = dragName; }, [dragName]);
  useEffect(() => { positionsRef.current = positions; }, [positions]);
  useEffect(() => { liveScaleRef.current = liveScale; }, [liveScale]);
  useEffect(() => { resizeNameRef.current = resizeName; }, [resizeName]);

  const getPosition = (name, index) => {
    const saved = positions[name];
    if (saved && typeof saved.xPct === 'number' && typeof saved.yPx === 'number') return saved;
    return defaultBoardPosition(index);
  };

  const getScale = (name) => {
    const saved = positions[name];
    const s = saved && typeof saved.scale === 'number' ? saved.scale : 1;
    return Math.max(MIN_SCALE, Math.min(MAX_SCALE, s));
  };

  // Pointer/touch based freeform dragging, so a card can be tacked down
  // literally anywhere on the board, not just swapped with a neighbor.
  const startDrag = (name, index, e) => {
    if (e.cancelable) e.preventDefault();
    const board = boardRef.current;
    if (!board) return;
    const boardRect = board.getBoundingClientRect();
    const pos = getPosition(name, index);
    const currentLeftPx = (pos.xPct / 100) * boardRect.width;
    const currentTopPx = pos.yPx;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    dragOffsetRef.current = {
      offsetX: clientX - (boardRect.left + currentLeftPx),
      offsetY: clientY - (boardRect.top + currentTopPx)
    };
    setDragName(name);
    setLivePos({ leftPx: currentLeftPx, topPx: currentTopPx });
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'grabbing';
  };

  useEffect(() => {
    if (!dragName) return;

    const getClient = (e) => {
      const t = e.touches && e.touches[0];
      return { x: t ? t.clientX : e.clientX, y: t ? t.clientY : e.clientY };
    };

    const handleMove = (e) => {
      if (e.cancelable) e.preventDefault();
      const board = boardRef.current;
      if (!board) return;
      const boardRect = board.getBoundingClientRect();
      const { x, y } = getClient(e);
      let leftPx = x - boardRect.left - dragOffsetRef.current.offsetX;
      let topPx = y - boardRect.top - dragOffsetRef.current.offsetY;
      leftPx = Math.max(0, Math.min(leftPx, boardRect.width - CARD_WIDTH));
      topPx = Math.max(0, topPx);
      setLivePos({ leftPx, topPx });
    };

    const finishDrag = () => {
      const board = boardRef.current;
      const pos = livePosRef.current;
      const name = dragNameRef.current;
      if (board && pos && name) {
        const boardRect = board.getBoundingClientRect();
        const xPct = (pos.leftPx / boardRect.width) * 100;
        const existingScale = positionsRef.current[name] && positionsRef.current[name].scale;
        onSavePosition(name, xPct, Math.round(pos.topPx), existingScale);
      }
      setDragName(null);
      setLivePos(null);
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
    };

    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', finishDrag);
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', finishDrag);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', finishDrag);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('touchend', finishDrag);
    };
  }, [dragName, onSavePosition]);

  // Corner-drag resizing. Dragging right/down grows the card, left/up
  // shrinks it, everything inside scales together since it's a CSS
  // transform on the whole note card.
  const startResize = (name, e) => {
    if (e.cancelable) e.preventDefault();
    e.stopPropagation();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const startScale = getScale(name);
    resizeStartRef.current = { startX: clientX, startScale };
    setResizeName(name);
    setLiveScale(startScale);
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'nwse-resize';
  };

  useEffect(() => {
    if (!resizeName) return;

    const getClientX = (e) => (e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX);

    const handleMove = (e) => {
      if (e.cancelable) e.preventDefault();
      const clientX = getClientX(e);
      const delta = clientX - resizeStartRef.current.startX;
      let next = resizeStartRef.current.startScale + delta / CARD_WIDTH;
      next = Math.max(MIN_SCALE, Math.min(MAX_SCALE, next));
      setLiveScale(next);
    };

    const finishResize = () => {
      const name = resizeNameRef.current;
      const scale = liveScaleRef.current;
      if (name && scale != null) {
        const existing = positionsRef.current[name];
        const idx = leaderboard.findIndex(([n]) => n === name);
        const fallback = defaultBoardPosition(idx === -1 ? 0 : idx);
        const xPct = existing && typeof existing.xPct === 'number' ? existing.xPct : fallback.xPct;
        const yPx = existing && typeof existing.yPx === 'number' ? existing.yPx : fallback.yPx;
        onSavePosition(name, xPct, yPx, scale);
      }
      setResizeName(null);
      setLiveScale(null);
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
    };

    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', finishResize);
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', finishResize);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', finishResize);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('touchend', finishResize);
    };
  }, [resizeName, onSavePosition, leaderboard]);

  const setImageForName = (name, file) => {
    if (!file) return;
    const previewUrl = URL.createObjectURL(file);
    setDraftImage(prev => {
      const existing = prev[name];
      if (existing && existing.previewUrl) URL.revokeObjectURL(existing.previewUrl);
      return {...prev, [name]: { file, previewUrl }};
    });
  };

  const clearImageForName = (name) => {
    setDraftImage(prev => {
      const existing = prev[name];
      if (existing && existing.previewUrl) URL.revokeObjectURL(existing.previewUrl);
      const next = {...prev};
      delete next[name];
      return next;
    });
  };

  const handlePaste = (e, name) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      if (item.kind === 'file' && item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) {
          setImageForName(name, file);
          e.preventDefault();
        }
        break;
      }
    }
  };

  const handleFilePicked = (e, name) => {
    const file = e.target.files && e.target.files[0];
    if (file) setImageForName(name, file);
    e.target.value = '';
  };

  const handleAdd = async (name) => {
    const text = draftText[name] || '';
    const image = draftImage[name];
    if (!text.trim() && !image) return;
    setUploadingFor(name);
    try {
      await onAddQuote(name, text, image ? image.file : undefined);
      setDraftText(prev => ({...prev, [name]: ''}));
      clearImageForName(name);
      setOpenAddFor(null);
    } catch (e) {
      // Save failed, leave the draft text/image in place so nothing is lost.
      // The shared error banner above the leaderboard explains what happened.
    } finally {
      setUploadingFor(null);
    }
  };

  // Board height grows to fit whatever is pinned lowest, so cards never
  // get clipped off the bottom of the corkboard.
  const boardMinHeight = useMemo(() => {
    let maxBottom = 420;
    leaderboard.forEach(([name], index) => {
      const pos = (dragName === name && livePos) ? { yPx: livePos.topPx } : getPosition(name, index);
      const scale = (resizeName === name && liveScale != null) ? liveScale : getScale(name);
      maxBottom = Math.max(maxBottom, pos.yPx + 820 * scale);
    });
    return maxBottom;
  }, [leaderboard, positions, dragName, livePos, resizeName, liveScale]);

  return React.createElement('div', {style:{marginTop:'34px'}},

    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px', flexWrap:'wrap', marginBottom:'16px'}},
      React.createElement('div', {style:{display:'flex', alignItems:'center', gap:'10px'}},
        React.createElement(Leaf, {size:16}),
        React.createElement('h2', {className:'display', style:{margin:0, fontSize:'26px', color:'var(--gold)', letterSpacing:'0.04em'}}, 'REVIEW LEADERBOARD'),
        React.createElement(Leaf, {size:16})
      ),
      unlocked && hasCustomPositions && React.createElement('button', {
        onClick: onResetPositions,
        style:{...lockBtnStyle, padding:'5px 10px', fontSize:'11px', background:'transparent'}
      }, '↺ Reset board layout')
    ),

    leaderboard.length === 0
      ? React.createElement('div', {style:{color:'#a89c8e', fontSize:'13px', padding:'20px 0'}}, 'No stars logged yet this month.')
      : React.createElement('div', {
          ref: boardRef,
          style:{
            position:'relative',
            width:'100%',
            minHeight: `${boardMinHeight}px`,
            borderRadius:'12px',
            border:'1px solid rgba(232,178,61,0.3)',
            background: `
              radial-gradient(rgba(0,0,0,0.18) 1px, transparent 1.5px),
              radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1.5px),
              linear-gradient(160deg, #7a5330 0%, #6b4526 100%)
            `,
            backgroundSize: '18px 18px, 14px 14px, 100% 100%',
            backgroundPosition: '0 0, 7px 7px, 0 0',
            boxShadow:'inset 0 0 40px rgba(0,0,0,0.45), 0 6px 24px rgba(0,0,0,0.35)',
            padding:'10px'
          }
        },
          leaderboard.map(([name, total], i) => {
            const nameQuotes = quotes[name] ? Object.entries(quotes[name]) : [];
            const isTop = total === leaderboard[0][1];
            const isDragging = dragName === name;
            const isResizing = resizeName === name;
            const pos = isDragging && livePos ? livePos : (() => {
              const p = getPosition(name, i);
              return { leftPx: null, topPx: p.yPx, xPct: p.xPct };
            })();
            const leftStyle = isDragging && livePos ? `${livePos.leftPx}px` : `${pos.xPct}%`;
            const rotation = (isDragging || isResizing) ? 0 : pinRotation(name);
            const effScale = isResizing && liveScale != null ? liveScale : getScale(name);

            return React.createElement('div', {
              key: name,
              style:{
                position:'absolute',
                left: leftStyle,
                top: `${pos.topPx}px`,
                width: `${CARD_WIDTH}px`,
                transform: `rotate(${rotation}deg) scale(${effScale * (isDragging ? 1.03 : 1)})`,
                transformOrigin: 'top left',
                transition: (isDragging || isResizing) ? 'none' : 'left 0.2s ease, top 0.2s ease',
                zIndex: (isDragging || isResizing) ? 50 : (isTop ? 3 : 2)
              }
            },
              // Pushpin, sticking out above the card.
              React.createElement('div', {
                onMouseDown: (e) => unlocked && startDrag(name, i, e),
                onTouchStart: (e) => unlocked && startDrag(name, i, e),
                title: unlocked ? 'Drag to move' : name,
                style:{
                  position:'absolute', top:'-16px', left:'50%', transform:'translateX(-50%)',
                  width:'40px', height:'40px', borderRadius:'50%',
                  background:'radial-gradient(circle at 35% 30%, #ffe08a, var(--gold-deep) 75%)',
                  border:'1px solid rgba(0,0,0,0.35)',
                  boxShadow:'0 6px 10px rgba(0,0,0,0.5)',
                  cursor: unlocked ? (isDragging ? 'grabbing' : 'grab') : 'default',
                  touchAction:'none',
                  zIndex:4
                }
              }),

              React.createElement('div', {
                style:{
                  position:'relative',
                  background: 'var(--card)',
                  border: `1px solid ${isTop ? 'var(--gold-deep)' : 'var(--line)'}`,
                  borderRadius:'12px',
                  padding:'36px 34px 34px',
                  boxShadow: isDragging ? '0 16px 30px rgba(0,0,0,0.55)' : (isTop ? '0 0 0 2px rgba(232,178,61,0.35), 0 8px 18px rgba(0,0,0,0.4)' : '0 6px 14px rgba(0,0,0,0.35)'),
                  display:'flex', flexDirection:'column', gap:'22px'
                }
              },
                React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px'}},
                  React.createElement('div', {style:{display:'flex', alignItems:'baseline', gap:'10px', minWidth:0}},
                    isTop && React.createElement('span', {style:{fontSize:'34px', flexShrink:0}}, '🏆'),
                    React.createElement('span', {
                      className:'display',
                      style:{
                        fontSize:'62px', lineHeight:1, color:'var(--ink)',
                        letterSpacing:'0.02em', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'
                      }
                    }, name.toUpperCase())
                  ),
                  React.createElement('span', {style:{
                    display:'flex', alignItems:'center', gap:'6px',
                    fontSize:'32px', fontWeight:900, color:'#4a2f00',
                    background:'linear-gradient(160deg, #ffe694, var(--gold) 55%, var(--gold-deep))',
                    border:'1px solid #fff3cf',
                    borderRadius:'30px', padding:'10px 24px', flexShrink:0,
                    boxShadow:'0 0 0 1px rgba(232,178,61,0.5), 0 4px 12px rgba(232,178,61,0.55), inset 0 1px 0 rgba(255,255,255,0.6)',
                    textShadow:'0 1px 0 rgba(255,255,255,0.4)'
                  }},
                    React.createElement('span', {style:{fontSize:'34px'}}, '⭐'),
                    total
                  )
                ),

                nameQuotes.length > 0 && React.createElement('div', {style:{display:'flex', flexDirection:'column', gap:'10px'}},
                  nameQuotes.map(([qKey, q]) =>
                    React.createElement('div', {
                      key:qKey,
                      style:{
                        background:'rgba(140,20,32,0.06)', borderLeft:'4px solid var(--red-deep)',
                        borderRadius:'8px', padding:'16px 18px', fontSize:'22px', color:'var(--ink)',
                        lineHeight:1.55, display:'flex', flexDirection:'column', gap:'10px'
                      }
                    },
                      q.text && React.createElement('span', {style:{fontStyle:'italic'}}, '“', q.text, '”'),
                      q.imageData && React.createElement('img', {
                        src: q.imageData,
                        alt: `Review screenshot for ${name}`,
                        style:{width:'100%', borderRadius:'8px', display:'block', border:'1px solid var(--line)'}
                      }),
                      unlocked && React.createElement('button', {
                        onClick: () => onRemoveQuote(name, qKey),
                        title:'Delete this quote',
                        style:{
                          alignSelf:'flex-start', display:'flex', alignItems:'center', gap:'6px',
                          border:'1px solid rgba(200,30,44,0.4)', background:'rgba(200,30,44,0.08)',
                          color:'var(--red-deep)', fontSize:'17px', fontWeight:600, borderRadius:'8px',
                          padding:'8px 16px', cursor:'pointer'
                        }
                      }, '🗑 Delete')
                    )
                  )
                ),

                unlocked && React.createElement('div', null,
                  openAddFor === name
                    ? React.createElement('div', {style:{display:'flex', flexDirection:'column', gap:'8px'}},
                        React.createElement('textarea', {
                          value: draftText[name] || '',
                          onChange: e => setDraftText(prev => ({...prev, [name]: e.target.value})),
                          onPaste: e => handlePaste(e, name),
                          onKeyDown: e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleAdd(name); },
                          placeholder: 'Paste review text, or paste (Ctrl/Cmd+V) a screenshot here…',
                          rows: 2,
                          style:{
                            width:'100%', resize:'vertical', fontSize:'19px', padding:'14px',
                            borderRadius:'7px', border:'1px solid var(--line)',
                            background:'#fff', color:'var(--ink)', fontFamily:'inherit'
                          }
                        }),

                        draftImage[name] && React.createElement('div', {style:{position:'relative', display:'inline-block', alignSelf:'flex-start'}},
                          React.createElement('img', {
                            src: draftImage[name].previewUrl,
                            alt: 'Screenshot preview',
                            style:{maxWidth:'190px', maxHeight:'140px', borderRadius:'7px', border:'1px solid var(--line)', display:'block'}
                          }),
                          React.createElement('button', {
                            onClick: () => clearImageForName(name),
                            title:'Remove screenshot',
                            style:{
                              position:'absolute', top:'-7px', right:'-7px', width:'22px', height:'22px',
                              borderRadius:'50%', border:'1px solid var(--gold-deep)', background:'var(--ink)',
                              color:'var(--gold)', fontSize:'12px', lineHeight:'19px', cursor:'pointer', padding:0
                            }
                          }, '✕')
                        ),

                        React.createElement('input', {
                          ref: el => { fileInputRefs.current[name] = el; },
                          type:'file', accept:'image/*',
                          onChange: e => handleFilePicked(e, name),
                          style:{display:'none'}
                        }),

                        React.createElement('div', {style:{display:'flex', gap:'8px', flexWrap:'wrap'}},
                          React.createElement('button', {
                            onClick: () => fileInputRefs.current[name] && fileInputRefs.current[name].click(),
                            style:{...lockBtnStyle, padding:'10px 18px', fontSize:'16px', background:'transparent'}
                          }, '📷 Screenshot'),
                          React.createElement('button', {
                            onClick: () => handleAdd(name),
                            disabled: uploadingFor === name,
                            style:{...lockBtnStyle, padding:'10px 18px', fontSize:'16px', opacity: uploadingFor === name ? 0.6 : 1}
                          }, uploadingFor === name ? 'Saving…' : 'Save'),
                          React.createElement('button', {
                            onClick: () => { setOpenAddFor(null); setDraftText(prev => ({...prev, [name]: ''})); clearImageForName(name); },
                            style:{...lockBtnStyle, padding:'10px 18px', fontSize:'16px', background:'transparent', color:'#8a7f76'}
                          }, 'Cancel')
                        )
                      )
                    : React.createElement('button', {
                        onClick: () => setOpenAddFor(name),
                        style:{
                          ...lockBtnStyle, alignSelf:'flex-start', padding:'10px 18px', fontSize:'16px',
                          background:'transparent', border:'1px dashed var(--gold-deep)', color:'var(--gold-deep)'
                        }
                      }, '+ Add review quote')
                ),

                unlocked && React.createElement('div', {
                  onMouseDown: (e) => startResize(name, e),
                  onTouchStart: (e) => startResize(name, e),
                  title: 'Drag to resize',
                  style:{
                    position:'absolute', bottom:'6px', right:'6px',
                    width:'22px', height:'22px', cursor:'nwse-resize', touchAction:'none',
                    display:'flex', alignItems:'flex-end', justifyContent:'flex-end',
                    padding:'4px'
                  }
                },
                  React.createElement('svg', {width:14, height:14, viewBox:'0 0 14 14'},
                    React.createElement('path', {
                      d:'M13 1 1 13 M13 6 6 13 M13 11 11 13',
                      stroke: 'var(--gold-deep)', strokeWidth:'2', strokeLinecap:'round'
                    })
                  )
                )
              )
            );
          })
        )
  );
}

const navBtnStyle = {
  border:'none', background:'rgba(232,178,61,0.15)', borderRadius:'4px',
  width:'26px', height:'26px', cursor:'pointer', fontSize:'13px', color:'var(--gold)', fontWeight:700
};
const thStyle = {
  padding:'12px 4px', fontSize:'11px', textAlign:'center', fontWeight:700, color:'#fdf9f2'
};
const tdNameStyle = {
  padding:'10px 16px', fontSize:'13px', fontWeight:700, whiteSpace:'nowrap'
};
const tdCellStyle = {
  padding:'8px 4px', textAlign:'center', borderBottom:'1px solid #ece0c8', borderRight:'1px solid #f1e6cf',
  userSelect:'none'
};
const removeBtnStyle = {
  position:'absolute', top:'1px', right:'1px', width:'15px', height:'15px', borderRadius:'50%',
  border:'none', background:'rgba(33,26,23,0.15)', color:'var(--ink)', fontSize:'8px', lineHeight:'15px',
  cursor:'pointer', padding:0
};
const lockBtnStyle = {
  border:'1px solid var(--gold)', background:'var(--black-soft)', color:'var(--gold)',
  borderRadius:'6px', padding:'6px 12px', fontSize:'12px', fontWeight:700, cursor:'pointer'
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
